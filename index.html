<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beyond the Beep — Video Booth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

  :root{
    --brass: #b8935a;
    --brass-light: #d9b98a;
    --charcoal: #1c1a18;
    --charcoal-soft: #2a2724;
    --cream: #f4ecdf;
    --glow: rgba(216, 184, 130, 0.35);
    --record-red: #c1453a;
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    height:100%;
    overflow:hidden;
    background: radial-gradient(ellipse at center, #2a2724 0%, #14120f 100%);
    font-family:'Inter', sans-serif;
    color: var(--cream);
    user-select:none;
  }

  .screen{
    height:100vh;
    width:100vw;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    transition: opacity .4s ease;
  }

  .hidden{ display:none !important; }

  /* ---------- WELCOME ---------- */
  #welcome{
    text-align:center;
    padding: 0 8%;
  }
  .brand-mark{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size: clamp(2.2rem, 8vw, 3.6rem);
    letter-spacing: 0.04em;
    color: var(--brass-light);
  }
  .brand-sub{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 3.2vw, 1.4rem);
    color: var(--cream);
    opacity:0.75;
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
  }
  .divider{
    width: 60px;
    height: 1px;
    background: var(--brass);
    margin: 1.8rem auto;
    opacity:0.6;
  }
  .start-btn{
    margin-top: 2.5rem;
    background: linear-gradient(135deg, var(--brass-light), var(--brass));
    color: var(--charcoal);
    border:none;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
    padding: 1.1rem 3rem;
    border-radius: 999px;
    box-shadow: 0 8px 30px var(--glow);
    cursor:pointer;
  }
  .start-btn:active{ transform: scale(0.97); }

  /* ---------- PROMPT SELECT ---------- */
  #prompts{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    padding: 6vh 6% 4vh;
  }
  .prompts-header{
    text-align:center;
    margin-bottom: 2.5vh;
  }
  .prompts-header h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    color: var(--brass-light);
  }
  .prompts-header p{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    opacity:0.65;
    margin-top: 0.4rem;
  }
  .prompt-list{
    flex:1;
    display:flex;
    flex-direction:column;
    gap: 2.2vh;
    justify-content:center;
    overflow-y:auto;
    padding: 1vh 0;
  }
  .prompt-card{
    background: var(--charcoal-soft);
    border: 1px solid rgba(184,147,90,0.25);
    border-radius: 18px;
    padding: 1.6rem 1.4rem;
    text-align:center;
    cursor:pointer;
    transition: all .15s ease;
  }
  .prompt-card:active{
    background: rgba(184,147,90,0.18);
    border-color: var(--brass);
    transform: scale(0.985);
  }
  .prompt-card .label{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size: clamp(1.15rem, 4.2vw, 1.5rem);
    color: var(--cream);
  }
  .prompt-card .hint{
    font-size: 0.78rem;
    opacity:0.5;
    margin-top: 0.35rem;
    letter-spacing:0.04em;
  }
  .custom-link{
    text-align:center;
    margin-top: 2vh;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size: 1rem;
    color: var(--brass-light);
    opacity:0.8;
    text-decoration: underline;
    text-decoration-color: rgba(184,147,90,0.4);
    cursor:pointer;
  }

  /* ---------- RECORDING ---------- */
  #record{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding: 2vh 4% 3vh;
    text-align:center;
    position:relative;
  }
  .rec-prompt{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size: clamp(1rem, 4vw, 1.5rem);
    color: var(--cream);
    line-height:1.4;
    max-width: 90%;
  }
  .rec-status{
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform:uppercase;
    opacity:0.55;
    margin-bottom:0.6rem;
  }
  .timer{
    font-family:'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    color: var(--brass-light);
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
  }

  .lens-wrap{
    position:relative;
    width: clamp(140px, 40vw, 200px);
    height: clamp(140px, 40vw, 200px);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .lens-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border: 2px solid var(--brass-light);
    opacity:0.7;
  }
  .lens-ring.pulse{
    animation: pulseRing 1.6s ease-out infinite;
  }
  @keyframes pulseRing{
    0%{ transform:scale(1); opacity:0.55; }
    70%{ transform:scale(1.35); opacity:0; }
    100%{ transform:scale(1.35); opacity:0; }
  }
  .lens-btn{
    width: 78%;
    height: 78%;
    border-radius:50%;
    border:none;
    background: radial-gradient(circle at 35% 30%, var(--brass-light), var(--brass) 70%);
    box-shadow: 0 0 40px var(--glow);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: all .2s ease;
  }
  .lens-btn.recording{
    background: radial-gradient(circle at 35% 30%, #e07a6f, var(--record-red) 70%);
    box-shadow: 0 0 50px rgba(193,69,58,0.45);
  }
  .lens-icon{
    width: 34%;
    height: 34%;
    border-radius:8px;
    background: var(--charcoal);
    transition: all .25s ease;
  }
  .lens-btn.recording .lens-icon{
    border-radius:50%;
  }
  .lens-btn:active{ transform: scale(0.95); }

  .controls-row{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 1.4rem;
    margin-bottom: 2vh;
  }
  .secondary-btn{
    background:none;
    border: 1px solid rgba(244,236,223,0.25);
    color: var(--cream);
    font-family:'Inter', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    padding: 0.7rem 1.8rem;
    border-radius: 999px;
    opacity:0.7;
    cursor:pointer;
  }

  /* ---------- REVIEW / THANK YOU ---------- */
  #review{
    text-align:center;
    padding: 0 8%;
  }
  .review-icon{
    width:64px; height:64px;
    border-radius:50%;
    border: 2px solid var(--brass);
    display:flex; align-items:center; justify-content:center;
    margin: 0 auto 1.6rem;
    font-size: 1.8rem;
    color: var(--brass-light);
  }
  #review h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size: clamp(1.8rem, 7vw, 2.6rem);
    color: var(--brass-light);
  }
  #review p{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size: clamp(1rem, 3.5vw, 1.2rem);
    opacity:0.7;
    margin-top: 0.6rem;
    line-height:1.6;
  }
  .review-actions{
    display:flex;
    flex-direction:column;
    gap: 1rem;
    margin-top: 3rem;
    width:100%;
  }
  .primary-btn{
    background: linear-gradient(135deg, var(--brass-light), var(--brass));
    color: var(--charcoal);
    border:none;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size: 1.05rem;
    letter-spacing: 0.05em;
    padding: 1rem 2rem;
    border-radius: 999px;
    cursor:pointer;
  }
  .ghost-btn{
    background:none;
    border: 1px solid rgba(184,147,90,0.4);
    color: var(--brass-light);
    font-family:'Inter', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.05em;
    padding: 1rem 2rem;
    border-radius: 999px;
    cursor:pointer;
  }

  .countdown{
    font-family:'Cormorant Garamond', serif;
    font-size: clamp(4rem, 22vw, 7rem);
    color: var(--brass-light);
    font-weight:600;
  }
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen" id="welcome">
  <div class="brand-mark">Beyond the Beep</div>
  <div class="brand-sub">hold on to every word</div>
  <div class="divider"></div>
  <p style="font-family:'Cormorant Garamond', serif; font-style:italic; opacity:0.7; font-size:1.05rem; max-width:80%; margin:0 auto; line-height:1.6;">
    Leave a video message for the happy couple
  </p>
  <button class="start-btn" onclick="showScreen('prompts')">Begin</button>
</div>

<!-- PROMPT SELECTION -->
<div class="screen hidden" id="prompts">
  <div class="prompts-header">
    <h1>Choose a prompt</h1>
    <p>or skip ahead and say it your way</p>
  </div>
  <div class="prompt-list" id="promptList">
    <!-- populated by JS -->
  </div>
  <div class="custom-link" onclick="selectPrompt('Say whatever is in your heart.')">Skip — just say hi</div>
</div>

<!-- RECORDING -->
<div class="screen hidden" id="record">
  <div style="position:relative; width:100%; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">

    <div style="position:absolute; top:0; left:0; right:0; z-index:5; padding-top:0.5vh;">
      <div class="rec-status" id="recStatus">Get ready</div>
      <div class="rec-prompt" id="recPromptText"></div>
    </div>

    <div id="countdownWrap" class="hidden">
      <div class="countdown" id="countdownNum">3</div>
    </div>

    <div id="recordWrap" class="hidden" style="width:100%; height:100%; position:relative;">
      <video id="preview" autoplay playsinline muted style="width:100%; height:100%; object-fit: cover; border-radius: 18px; background:#000; pointer-events: none;"></video>

      <div class="timer" id="timer" style="position:absolute; top:14px; right:16px; background:rgba(28,26,24,0.55); padding:0.2rem 0.8rem; border-radius:999px; z-index:5;">0:00</div>

      <div class="lens-wrap" style="position:absolute; bottom:18px; left:50%; transform:translateX(-50%); width:clamp(72px, 18vw, 96px); height:clamp(72px, 18vw, 96px); z-index:5;">
        <div class="lens-ring" id="lensRing"></div>
        <button class="lens-btn" id="lensBtn" onclick="stopRecording()" ontouchend="stopRecording()">
          <div class="lens-icon" id="lensIcon"></div>
        </button>
      </div>
    </div>
  </div>

  <div class="controls-row">
    <button class="secondary-btn hidden" id="cancelBtn" onclick="resetToPrompts()">Start over</button>
  </div>
</div>

<!-- REVIEW -->
<div class="screen hidden" id="review">
  <div class="review-icon">✓</div>
  <h1>Message received</h1>
  <p>Thank you for sharing your words.<br>They'll be treasured for years to come.</p>
  <div class="review-actions">
    <button class="primary-btn" onclick="resetToWelcome()">Done — next guest</button>
    <button class="ghost-btn" id="rerecordBtn" onclick="resetToPrompts()">Record another message</button>
  </div>
</div>

<script>
  const PROMPTS = [
    { label: "Share your favorite memory together", hint: "30–60 seconds" },
    { label: "Offer a piece of advice for the marriage", hint: "30–60 seconds" },
    { label: "Tell them what you wish for their future", hint: "30–60 seconds" },
    { label: "Send a toast or blessing", hint: "30–60 seconds" }
  ];

  let selectedPrompt = "";
  let mediaRecorder = null;
  let recordedChunks = [];
  let stream = null;
  let timerInterval = null;
  let seconds = 0;
  let maxSeconds = 90; // safety cap

  function buildPrompts(){
    const list = document.getElementById('promptList');
    list.innerHTML = '';
    PROMPTS.forEach(p => {
      const card = document.createElement('div');
      card.className = 'prompt-card';
      card.onclick = () => selectPrompt(p.label);
      card.innerHTML = `<div class="label">${p.label}</div><div class="hint">${p.hint}</div>`;
      list.appendChild(card);
    });
  }
  buildPrompts();

  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function selectPrompt(text){
    selectedPrompt = text;
    document.getElementById('recPromptText').textContent = text;
    showScreen('record');
    startCountdown();
  }

  async function startCountdown(){
    document.getElementById('recStatus').textContent = 'Requesting camera...';
    document.getElementById('recordWrap').classList.add('hidden');
    document.getElementById('countdownWrap').classList.add('hidden');
    document.getElementById('cancelBtn').classList.add('hidden');

    // Check basic support first
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      document.getElementById('recStatus').textContent = 'Error: getUserMedia not available (need HTTPS + supported browser)';
      return;
    }

    // Request camera/mic access up front
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' },
        audio: true
      });
      const preview = document.getElementById('preview');
      preview.srcObject = stream;
      preview.onloadedmetadata = () => preview.play().catch(e => console.error('play error', e));
    } catch(err) {
      document.getElementById('recStatus').textContent = 'Error: ' + err.name + ' - ' + err.message;
      return;
    }

    document.getElementById('recStatus').textContent = 'Get ready';
    document.getElementById('countdownWrap').classList.remove('hidden');

    let count = 3;
    const numEl = document.getElementById('countdownNum');
    numEl.textContent = count;
    const interval = setInterval(() => {
      count--;
      if(count > 0){
        numEl.textContent = count;
      } else {
        clearInterval(interval);
        document.getElementById('countdownWrap').classList.add('hidden');
        document.getElementById('recordWrap').classList.remove('hidden');
        document.getElementById('cancelBtn').classList.remove('hidden');
        startRecording();
      }
    }, 800);
  }

  function getSupportedMimeType(){
    const types = [
      'video/mp4',
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8,opus',
      'video/webm'
    ];
    for(const type of types){
      if(MediaRecorder.isTypeSupported(type)) return type;
    }
    return ''; // let browser pick default
  }

  function startRecording(){
    document.getElementById('lensBtn').classList.add('recording');
    document.getElementById('lensRing').classList.add('pulse');
    seconds = 0;
    updateTimer();

    try {
      recordedChunks = [];
      const mimeType = getSupportedMimeType();
      mediaRecorder = mimeType
        ? new MediaRecorder(stream, { mimeType })
        : new MediaRecorder(stream);

      mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = handleRecordingStop;
      mediaRecorder.onerror = e => {
        document.getElementById('recStatus').textContent = 'Recorder error: ' + (e.error ? e.error.name : 'unknown');
      };
      mediaRecorder.start();
      document.getElementById('recStatus').textContent = 'Recording (' + (mimeType || 'default') + ') — tap to finish';
    } catch(err) {
      document.getElementById('recStatus').textContent = 'MediaRecorder error: ' + err.name + ' - ' + err.message;
    }

    timerInterval = setInterval(() => {
      seconds++;
      updateTimer();
      if(seconds >= maxSeconds) stopRecording();
    }, 1000);
  }

  function updateTimer(){
    const m = Math.floor(seconds / 60);
    const s = (seconds % 60).toString().padStart(2, '0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }

  function stopRecording(){
    const btn = document.getElementById('lensBtn');
    if(btn.disabled) return;
    btn.disabled = true;

    clearInterval(timerInterval);
    document.getElementById('lensBtn').classList.remove('recording');
    document.getElementById('lensRing').classList.remove('pulse');
    document.getElementById('recStatus').textContent = 'Saving... (state: ' + (mediaRecorder ? mediaRecorder.state : 'null') + ')';

    if(mediaRecorder && mediaRecorder.state === 'recording'){
      mediaRecorder.requestData();
      mediaRecorder.stop();
    } else {
      setTimeout(handleRecordingStop, 1500); // delay so debug text is visible
    }
  }

  function handleRecordingStop(){
    document.getElementById('lensBtn').disabled = false;
    // In production: upload/save recordedChunks (Blob) here.
    // const blob = new Blob(recordedChunks, { type: 'video/webm' });

    // Stop camera/mic now that recording is done
    if(stream){
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }
    showScreen('review');
  }

  function resetToPrompts(){
    if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
    clearInterval(timerInterval);
    selectedPrompt = "";
    showScreen('prompts');
  }

  function resetToWelcome(){
    if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
    clearInterval(timerInterval);
    showScreen('welcome');
  }
</script>
</body>
</html>
